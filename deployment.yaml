apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysite-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysite
  template:
    metadata:
      labels:
        app: mysite
    spec:
      hostNetwork: true           
      containers:
      - name: mysite
        image: harshitp098/mysite:latest
        ports:
        - containerPort: 80        
          hostPort: 30080         


apiVersion: v1
kind: Service
metadata:
  name: mysite-service
spec:
  type: NodePort
  selector:
    app: mysite
  ports:
    - protocol: TCP
      port: 80           
      targetPort: 80     
      nodePort: 30080    
